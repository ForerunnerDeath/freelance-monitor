x-app-environment: &app-environment
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: freelance_monitor
  DB_PASSWORD: freelance_monitor_password
  DB_NAME: freelance_monitor
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  postgres:
    image: postgres:18-alpine
    container_name: freelance_monitor_postgres
    environment:
      POSTGRES_DB: freelance_monitor
      POSTGRES_USER: freelance_monitor
      POSTGRES_PASSWORD: freelance_monitor_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    container_name: freelance_monitor_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
  worker:
    build: .
    container_name: freelance_monitor_worker
    env_file:
      - .env
    environment:
      <<: *app-environment
    depends_on:
      - postgres
      - redis
    command: python -m workers.telegram_worker
  
  api:
    build: .
    container_name: freelance_monitor_api
    environment:
      <<: *app-environment
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
  
  monitor:
    build: .
    container_name: freelance_monitor_monitor
    environment:
      <<: *app-environment
      ENABLE_FL_RU: "true"
      ENABLE_PROFI_RU: "true"
      PROFI_RU_HEADLESS: "true"
      PROFI_RU_STORAGE_STATE: /app/playwright_auth/profi_storage_state.json
    depends_on:
      - postgres
      - redis
    volumes:
      - playwright_profiles:/app/playwright_profiles
      - ./playwright_auth:/app/playwright_auth:ro
    command: python main.py watch

volumes:
  postgres_data:
  redis_data:
  playwright_profiles:
