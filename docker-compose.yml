services:
  postgres:
    image: postgres:18-alpine
    container_name: freelance_monitor_postgres
    environment:
      POSTGRES_DB: freelance_monitor
      POSTGRES_USER: freelance_monitor
      POSTGRES_PASSWORD: freelance_monitor_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    container_name: freelance_monitor_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    container_name: freelance_monitor_app
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: freelance_monitor
      DB_PASSWORD: freelance_monitor_password
      DB_NAME: freelance_monitor
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    command: >
      python -c "from sqlalchemy import text; from database import engine;
      import redis, config;
      conn = engine.connect();
      print(conn.execute(text('select 1')).scalar());
      conn.close();
      r = redis.Redis(host=config.REDIS_HOST, port=config.REDIS_PORT, decode_responses=True);
      print(r.ping())"
    
  worker:
    build: .
    container_name: freelance_monitor_worker
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: freelance_monitor
      DB_PASSWORD: freelance_monitor_password
      DB_NAME: freelance_monitor
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    command: python -m workers.telegram_worker
  
  api:
    build: .
    container_name: freelance_monitor_api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: freelance_monitor
      DB_PASSWORD: freelance_monitor_password
      DB_NAME: freelance_monitor
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    ports:
      - "127.0.0.1:8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data:
  redis_data:
