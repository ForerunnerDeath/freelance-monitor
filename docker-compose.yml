x-app-environment: &app-environment
  DB_HOST: postgres
  DB_PORT: 5432
  DB_USER: freelance_monitor
  DB_PASSWORD: freelance_monitor_password
  DB_NAME: freelance_monitor
  REDIS_HOST: redis
  REDIS_PORT: 6379

services:
  postgres:
    image: postgres:18-alpine
    container_name: freelance_monitor_postgres
    environment:
      POSTGRES_DB: freelance_monitor
      POSTGRES_USER: freelance_monitor
      POSTGRES_PASSWORD: freelance_monitor_password
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelance_monitor -d freelance_monitor"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: freelance_monitor_redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    
  worker:
    build: .
    container_name: freelance_monitor_worker
    env_file:
      - .env
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m workers.telegram_worker
    restart: unless-stopped
  
  api:
    build: .
    container_name: freelance_monitor_api
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)\""
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
  
  monitor:
    build: .
    container_name: freelance_monitor_monitor
    environment:
      <<: *app-environment
      ENABLE_FL_RU: "true"
      ENABLE_PROFI_RU: "true"
      PROFI_RU_HEADLESS: "true"
      PROFI_RU_STORAGE_STATE: /app/playwright_auth/profi_storage_state.json
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - playwright_profiles:/app/playwright_profiles
      - ./playwright_auth:/app/playwright_auth:ro
    command: python main.py watch
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  playwright_profiles:
